################################################################################
# PGVECTOR SETUP — v2 Complete Reference
# Used by: SellBot RAG Backend (src/vector_databases.py + src/faq_db.py)
# Phase: Multi-Project RAG (3-table schema, 2026-03-01)
# Previous version: PGVECTOR_SETUP.yml
################################################################################

overview:
  what_is_pgvector: >
    pgvector is a PostgreSQL extension that adds a native vector data type
    and similarity search operators (<=> cosine, <-> L2, <#> inner product).
    The RAG system uses it to store document embeddings and retrieve the most
    semantically similar chunks for a given query.

  v2_changes: >
    In v2 the schema expands from one table (rag_documents) to three tables:
    projects, rag_documents (+ project_id FK), and faq_entries. The app now
    auto-creates all three at startup. Existing installations run the migration
    script once to add the new columns.

  current_rag_config:
    embedding_model: BAAI/bge-large-en-v1.5
    embedding_provider: fastembed (ONNX Runtime)
    dimensions: 1024
    table_name: rag_documents
    similarity_function: "1 - cosine_distance  (operator: <=>)"
    index_type: HNSW (auto-created by _setup_database())
    monthly_cost: $0

# ==============================================================================
# FULL SCHEMA (v2 — auto-created by PgVectorDatabase._setup_database() + setup_faq_table())
# ==============================================================================

schema:

  table_projects:
    name: projects
    created_by: "PgVectorDatabase._setup_database() — created first (FK parent)"
    columns:
      project_id:
        type: "UUID PRIMARY KEY DEFAULT gen_random_uuid()"
      project_name:
        type: "VARCHAR(255) NOT NULL"
      vdb_namespace:
        type: "VARCHAR(255) NOT NULL UNIQUE"
        notes: "Used for project identity; Default Project has vdb_namespace = 'default'"
      created_at:
        type: "TIMESTAMP DEFAULT NOW()"
      updated_at:
        type: "TIMESTAMP DEFAULT NOW()"
        notes: "Auto-updated via trigger update_updated_at_column()"
    default_row:
      project_name: Default Project
      vdb_namespace: default
      created_by: "get_or_create_default_project() called at app startup"

  table_rag_documents:
    name: rag_documents
    created_by: "PgVectorDatabase._setup_database()"
    columns:
      id:
        type: TEXT
        constraint: PRIMARY KEY
        format: "doc_{counter}_{unix_timestamp}_{chunk_index}"
      embedding:
        type: "vector(1024)"
        notes: "Dimension must match EMBEDDING_CONFIG['dimensions'] in config.py"
      text:
        type: TEXT
        notes: Raw chunk text
      metadata:
        type: JSONB
        fields: "{filename, document_id, chunk_index, total_chunks, upload_time}"
      created_at:
        type: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
      project_id:
        type: "UUID REFERENCES projects(project_id) ON DELETE CASCADE"
        notes: "Added in v2. Nullable for backward compatibility during migration."
    indexes:
      rag_documents_embedding_idx:
        type: HNSW
        operator_class: vector_cosine_ops
        parameters: "{m: 16, ef_construction: 64}"
      idx_rag_documents_project_id:
        type: btree
        column: project_id

  table_faq_entries:
    name: faq_entries
    created_by: "setup_faq_table() in src/faq_db.py — called at app startup"
    columns:
      id:
        type: "SERIAL PRIMARY KEY"
      project_id:
        type: "UUID REFERENCES projects(project_id) ON DELETE CASCADE"
        notes: "Nullable — NULL means no project scoping"
      question:
        type: "TEXT NOT NULL"
      answer:
        type: "TEXT NOT NULL"
      category:
        type: "VARCHAR(100) NOT NULL DEFAULT 'General'"
        allowed_values: [Pricing, Amenities, Location, Process, Specifications, Security, General]
      source_file:
        type: "VARCHAR(255)"
        notes: Original filename that generated this FAQ
      created_at:
        type: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
    indexes:
      idx_faq_category:
        type: btree
        column: category
      idx_faq_project_id:
        type: btree
        column: project_id
      idx_faq_fts:
        type: GIN
        expression: "to_tsvector('english', question)"
        notes: "Used by search_faq() ts_rank full-text search"
    dedup_rule: "Skips INSERT if exact same question already exists for same source_file + project_id"

  relationships: |
    projects (1) ──< (N) rag_documents   project_id FK — ON DELETE CASCADE
    projects (1) ──< (N) faq_entries     project_id FK — ON DELETE CASCADE

# ==============================================================================
# INSTALLATION OPTIONS
# ==============================================================================

installation:

  option_1_local_ubuntu_debian:
    recommended_for: Development on Linux
    steps:
      - name: Install PostgreSQL
        commands:
          - "sudo apt update"
          - "sudo apt install postgresql postgresql-contrib"
      - name: Install pgvector extension package
        commands:
          - "sudo apt install postgresql-15-pgvector"
          - "# If on PostgreSQL 16: sudo apt install postgresql-16-pgvector"
      - name: Verify PostgreSQL is running
        commands:
          - "sudo systemctl status postgresql"
          - "sudo systemctl enable postgresql"

  option_2_macos_homebrew:
    recommended_for: Development on macOS
    steps:
      - name: Install PostgreSQL
        command: "brew install postgresql@15"
      - name: Install pgvector
        command: "brew install pgvector"
      - name: Start PostgreSQL
        command: "brew services start postgresql@15"

  option_3_docker:
    recommended_for: Fastest setup
    steps:
      - name: Pull and run postgres+pgvector image
        command: |
          docker run -d \
            --name postgres-pgvector \
            -e POSTGRES_PASSWORD=mypassword \
            -e POSTGRES_DB=rag_db \
            -p 5432:5432 \
            ankane/pgvector
      - name: Connect to the container
        command: "docker exec -it postgres-pgvector psql -U postgres -d rag_db"

  option_4_supabase_cloud:
    recommended_for: Production / MVP (free tier available)
    cost: "FREE up to 500 MB; $25/month for 8 GB"
    notes:
      - "Sign up at https://supabase.com"
      - "pgvector is PRE-INSTALLED — no setup needed"
      - "Copy connection string from Settings → Database"
    connection_string_format: "postgresql://postgres:[PASSWORD]@db.[PROJECT_REF].supabase.co:5432/postgres"

# ==============================================================================
# STEP-BY-STEP DATABASE SETUP
# ==============================================================================

setup_steps:

  step_1_connect_as_superuser:
    local: "sudo -u postgres psql"
    docker: "docker exec -it postgres-pgvector psql -U postgres"

  step_2_create_database_and_user:
    sql: |
      CREATE DATABASE rag_db;
      CREATE USER rag_user WITH PASSWORD 'secure_password';
      GRANT ALL PRIVILEGES ON DATABASE rag_db TO rag_user;
      \c rag_db

  step_3_enable_extensions:
    sql: |
      -- Both required for multi-project schema
      CREATE EXTENSION IF NOT EXISTS vector;
      CREATE EXTENSION IF NOT EXISTS "pgcrypto";   -- for gen_random_uuid()
      \dx

  step_4_grant_schema_permissions:
    sql: |
      \c rag_db
      GRANT ALL ON SCHEMA public TO rag_user;
      GRANT USAGE ON SCHEMA public TO rag_user;

  step_5_add_env_variable:
    file: .env
    content: |
      PGVECTOR_CONNECTION_STRING=postgresql://rag_user:secure_password@localhost:5432/rag_db

  step_6_start_app:
    command: "uvicorn app:app --reload"
    expected_output: |
      ✓ Embedding model: BAAI/bge-large-en-v1.5 (1024 dims)
      ✓ Vector database: pgvector
      ✓ LLM: sam860/LFM2:1.2b (Ollama)
      FAQ table ready.
      ✓ FAQ table ready | Default project: <uuid>
    what_happens: >
      _setup_database() auto-creates: projects table, rag_documents table (with project_id),
      HNSW index. setup_faq_table() creates faq_entries table + indexes.
      get_or_create_default_project() inserts Default Project row.

  step_7_migration_existing_db:
    note: "Only needed if you have an existing rag_documents table WITHOUT project_id"
    command: "python scripts/migrate_multiproject.py"
    script_does:
      - Creates projects table (if not exists)
      - Inserts Default Project row (ON CONFLICT DO NOTHING)
      - ALTER TABLE rag_documents ADD COLUMN IF NOT EXISTS project_id UUID FK
      - UPDATE rag_documents SET project_id = default_project WHERE project_id IS NULL
      - Creates faq_entries table (if not exists)
      - Creates all indexes

# ==============================================================================
# CONFIGURATION (config.py)
# ==============================================================================

config_py_settings:
  section: VECTOR_DB_CONFIG
  provider: pgvector
  required: |
    VECTOR_DB_CONFIG = {
        "provider": "pgvector",
        "pgvector": {
            "connection_string": os.getenv("PGVECTOR_CONNECTION_STRING"),
            "table_name": "rag_documents",
        },
    }

  embedding_must_match: |
    EMBEDDING_CONFIG = {
        "provider": "fastembed",
        "model": "BAAI/bge-large-en-v1.5",
        "dimensions": 1024,   # MUST match vector(1024) in rag_documents table
    }

  critical_constraint: >
    The "dimensions" value in EMBEDDING_CONFIG must exactly match the dimension
    used when the rag_documents table was first created. If you change embedding
    model dimensions, you must DROP the table and restart:
    DROP TABLE rag_documents;

# ==============================================================================
# HOW THE APP USES PGVECTOR (src/vector_databases.py — PgVectorDatabase)
# ==============================================================================

code_behaviour:

  on_startup:
    - "Opens persistent psycopg2 connection with autocommit=True"
    - "Calls _setup_database():"
    - "  1. CREATE EXTENSION IF NOT EXISTS vector"
    - "  2. CREATE EXTENSION IF NOT EXISTS pgcrypto"
    - "  3. CREATE TABLE IF NOT EXISTS projects (...)"
    - "  4. CREATE TABLE IF NOT EXISTS rag_documents (... project_id UUID FK ...)"
    - "  5. CREATE INDEX IF NOT EXISTS ... USING hnsw (...)"
    - "  6. CREATE INDEX IF NOT EXISTS idx_rag_documents_project_id ..."
    - "app.py then calls setup_faq_table() → creates faq_entries table + indexes"
    - "app.py then calls get_or_create_default_project() → returns default UUID"

  on_upload:
    method: add(embeddings, texts, metadata_list, project_id=None)
    sql: |
      INSERT INTO rag_documents (id, embedding, text, metadata, project_id)
      VALUES %s
      ON CONFLICT (id) DO UPDATE SET
          embedding = EXCLUDED.embedding,
          text = EXCLUDED.text,
          metadata = EXCLUDED.metadata
    notes:
      - "Uses psycopg2.extras.execute_values for batch insert"
      - "project_id cast to ::uuid on insert"
      - "Resolved project_id is always provided from app.py (never None in practice)"

  on_query:
    method: "search(query_embedding, top_k, project_id=None)"
    sql_with_project: |
      SELECT id, text, metadata,
             1 - (embedding <=> %s::vector) AS similarity
      FROM rag_documents
      WHERE project_id = %s::uuid
      ORDER BY embedding <=> %s::vector
      LIMIT %s
    sql_without_project: |
      SELECT id, text, metadata,
             1 - (embedding <=> %s::vector) AS similarity
      FROM rag_documents
      ORDER BY embedding <=> %s::vector
      LIMIT %s
    filter_in_app: "similarity_score > RAG_CONFIG['similarity_threshold'] (0.15)"
    returns: "List[Tuple[id, text, metadata_dict, similarity_float]]"

  faq_on_upload:
    flow:
      - "generate_faqs(full_text, llm_client, source_file) → List[{question, answer, category}]"
      - "store_faqs(faqs, source_file, db_conn, project_id=resolved_project_id)"
      - "INSERT INTO faq_entries (project_id, question, answer, category, source_file)"
    dedup: "SELECT check before INSERT — skip if same question + source_file + project_id exists"

  faq_on_query:
    method: "search_faq(question, conn, project_id=None)"
    sql_with_project: |
      SELECT id, question, answer, category, source_file,
             ts_rank(to_tsvector('english', question), plainto_tsquery('english', %s)) AS rank
      FROM faq_entries
      WHERE project_id = %s
        AND to_tsvector('english', question) @@ plainto_tsquery('english', %s)
      ORDER BY rank DESC
      LIMIT 1
    threshold: "rank > 0.01 — returns None if no meaningful match"
    returns: "{id, question, answer, category, source_file, rank} or None"

# ==============================================================================
# VERIFICATION QUERIES
# ==============================================================================

verification:

  check_tables_exist:
    sql: |
      SELECT table_name FROM information_schema.tables
      WHERE table_schema = 'public'
      AND table_name IN ('projects', 'rag_documents', 'faq_entries');

  check_projects:
    sql: "SELECT * FROM projects;"

  check_rag_documents_schema:
    sql: |
      \d rag_documents
      -- Expected columns: id, embedding (vector 1024), text, metadata (jsonb),
      --                   created_at, project_id (uuid)

  check_faq_entries_schema:
    sql: |
      \d faq_entries
      -- Expected columns: id, project_id (uuid), question, answer, category,
      --                   source_file, created_at

  check_indexes:
    sql: |
      SELECT indexname, indexdef FROM pg_indexes
      WHERE tablename IN ('rag_documents', 'faq_entries', 'projects');
      -- Expected: rag_documents_embedding_idx (hnsw), idx_rag_documents_project_id,
      --           idx_faq_category, idx_faq_project_id, idx_faq_fts

  check_default_project:
    sql: "SELECT * FROM projects WHERE vdb_namespace = 'default';"

  check_row_counts:
    sql: |
      SELECT 'projects' AS tbl, COUNT(*) FROM projects
      UNION ALL
      SELECT 'rag_documents', COUNT(*) FROM rag_documents
      UNION ALL
      SELECT 'faq_entries', COUNT(*) FROM faq_entries;

  upload_test:
    command: |
      curl -X POST http://localhost:8000/upload \
        -F "file=@./real_estate_documents/sample_documents/project_info.txt"
    expected_response: "{status: success, chunks_added: N, faqs_generated: M}"

  query_test:
    command: |
      curl -s -X POST http://localhost:8000/query \
        -H "Content-Type: application/json" \
        -d '{"question": "What properties are available?"}' | python3 -m json.tool
    expected_fields: [answer, sources, source_type]

  faq_test:
    command: "curl -s http://localhost:8000/faqs | python3 -m json.tool"
    expected_fields: [categories, total]

# ==============================================================================
# DIRECT SQL — MULTI-PROJECT OPERATIONS
# ==============================================================================

direct_sql:

  create_project:
    sql: |
      INSERT INTO projects (project_name, vdb_namespace)
      VALUES ('Sunrise Heights', gen_random_uuid()::text)
      RETURNING project_id::text, project_name, vdb_namespace;

  list_projects:
    sql: "SELECT project_id::text, project_name, vdb_namespace, created_at FROM projects ORDER BY created_at;"

  count_docs_per_project:
    sql: |
      SELECT p.project_name, COUNT(r.id) AS doc_count
      FROM projects p
      LEFT JOIN rag_documents r ON r.project_id = p.project_id
      GROUP BY p.project_name;

  count_faqs_per_project:
    sql: |
      SELECT p.project_name, COUNT(f.id) AS faq_count
      FROM projects p
      LEFT JOIN faq_entries f ON f.project_id = p.project_id
      GROUP BY p.project_name;

  project_scoped_vector_search:
    description: Direct project-scoped similarity search
    sql: |
      SELECT id, text, metadata,
             1 - (embedding <=> '[0.1, 0.2, ...]'::vector) AS similarity
      FROM rag_documents
      WHERE project_id = 'your-uuid-here'::uuid
      ORDER BY embedding <=> '[0.1, 0.2, ...]'::vector
      LIMIT 5;

  delete_project_data:
    note: "Prefer using DELETE /projects/{id} API — CASCADE handles child rows"
    sql: "DELETE FROM projects WHERE project_id = 'your-uuid'::uuid;"

  manual_faq_insert:
    sql: |
      INSERT INTO faq_entries (project_id, question, answer, category, source_file)
      VALUES (
        (SELECT project_id FROM projects WHERE vdb_namespace = 'default'),
        'What is the price of a 3BHK?',
        'The 3BHK units start at Rs. 85 Lakhs.',
        'Pricing',
        'brochure.pdf'
      );

  faq_full_text_search:
    sql: |
      SELECT id, question, answer, category,
             ts_rank(to_tsvector('english', question), plainto_tsquery('english', 'price 3BHK')) AS rank
      FROM faq_entries
      WHERE to_tsvector('english', question) @@ plainto_tsquery('english', 'price 3BHK')
      ORDER BY rank DESC
      LIMIT 5;

  index_operators:
    cosine: "<=>  — cosine distance (used by RAG system)"
    l2: "<->  — L2 Euclidean distance"
    inner_product: "<#>  — negative inner product"

# ==============================================================================
# TROUBLESHOOTING
# ==============================================================================

troubleshooting:

  error_type_vector_does_not_exist:
    message: 'ERROR: type "vector" does not exist'
    fix:
      - "sudo apt install postgresql-15-pgvector"
      - "sudo -u postgres psql rag_db -c 'CREATE EXTENSION vector;'"

  error_function_gen_random_uuid_not_found:
    message: "ERROR: function gen_random_uuid() does not exist"
    cause: pgcrypto extension not installed
    fix: "sudo -u postgres psql rag_db -c 'CREATE EXTENSION pgcrypto;'"

  error_permission_denied_extension:
    message: "ERROR: permission denied to create extension"
    fix:
      - "sudo -u postgres psql rag_db"
      - "CREATE EXTENSION vector;"
      - "CREATE EXTENSION pgcrypto;"

  error_could_not_connect:
    message: "psycopg2.OperationalError: could not connect to server"
    fix:
      - "sudo systemctl start postgresql"
      - 'psql "postgresql://rag_user:password@localhost:5432/rag_db"  # manual test'

  error_dimension_mismatch:
    message: "ERROR: expected N dimensions, not M"
    cause: Table created with different embedding dimensions
    fix:
      - 'psql "..." -c "DROP TABLE rag_documents;"'
      - "# Restart server — table recreates automatically"
      - "# Re-upload all documents"

  error_faq_table_not_found:
    message: "relation faq_entries does not exist"
    cause: setup_faq_table() failed or wasn't called (non-pgvector config)
    fix: "Restart app — setup_faq_table() is called at startup"

  error_project_id_fk_violation:
    message: "ERROR: insert or update on table violates foreign key constraint"
    cause: "project_id passed to add() or store_faqs() doesn't exist in projects table"
    fix: "Create the project first via POST /projects or ensure default project exists"

  zombie_connections:
    sql: |
      SELECT pg_terminate_backend(pid)
      FROM pg_stat_activity
      WHERE datname = 'rag_db' AND state = 'idle';

# ==============================================================================
# PRODUCTION RECOMMENDATIONS
# ==============================================================================

production:

  connection_pooling:
    tool: pgBouncer
    reason: >
      The RAG app opens one persistent connection. Under high load with multiple
      workers (gunicorn -w 4), use pgBouncer to pool connections efficiently.

  backups:
    backup: "pg_dump rag_db > rag_db_backup_$(date +%Y%m%d).sql"
    restore: "psql rag_db < rag_db_backup.sql"
    important: "Backup includes all three tables: projects, rag_documents, faq_entries"

  monitoring:
    index_usage: |
      SELECT indexname, idx_scan, idx_tup_read
      FROM pg_stat_user_indexes
      WHERE relname IN ('rag_documents', 'faq_entries');
    table_sizes: |
      SELECT relname, pg_size_pretty(pg_total_relation_size(relid))
      FROM pg_stat_user_tables
      WHERE relname IN ('projects', 'rag_documents', 'faq_entries');

  scaling:
    under_100k_vectors: "HNSW index (auto-created) is sufficient"
    over_100k_vectors: "Switch to IVFFlat with lists = sqrt(row_count)"
    millions_of_vectors: "Consider Pinecone or dedicated vector DB"

# ==============================================================================
# QUICK SETUP CHECKLIST (v2)
# ==============================================================================

checklist:
  new_installation:
    - "[ ] Install PostgreSQL (apt / brew / Docker)"
    - "[ ] Install pgvector: apt install postgresql-15-pgvector"
    - "[ ] Connect as superuser: sudo -u postgres psql"
    - "[ ] CREATE DATABASE rag_db;"
    - "[ ] \\c rag_db"
    - "[ ] CREATE EXTENSION IF NOT EXISTS vector;"
    - "[ ] CREATE EXTENSION IF NOT EXISTS pgcrypto;"
    - "[ ] CREATE USER rag_user WITH PASSWORD 'password';"
    - "[ ] GRANT ALL PRIVILEGES ON DATABASE rag_db TO rag_user;"
    - "[ ] GRANT ALL ON SCHEMA public TO rag_user;"
    - "[ ] \\q"
    - "[ ] Add PGVECTOR_CONNECTION_STRING to .env"
    - "[ ] pip install -r requirements_api.txt"
    - "[ ] python app.py — confirm FAQ table ready + Default project UUID printed"
    - "[ ] curl http://localhost:8000/ — confirm all endpoints listed"
    - "[ ] Upload a test doc and verify faqs_generated > 0 in response"
    - "[ ] curl http://localhost:8000/faqs — verify categories returned"

  existing_installation_migration:
    - "[ ] Backup existing data: pg_dump rag_db > backup.sql"
    - "[ ] Ensure pgcrypto extension is installed: CREATE EXTENSION IF NOT EXISTS pgcrypto;"
    - "[ ] python scripts/migrate_multiproject.py"
    - "[ ] Verify: SELECT * FROM projects; (should see Default Project)"
    - "[ ] Verify: SELECT column_name FROM information_schema.columns WHERE table_name='rag_documents';"
    - "[ ] (Optional) Manually run: ALTER TABLE rag_documents ALTER COLUMN project_id SET NOT NULL;"
    - "[ ] Restart app and confirm normal startup"
