# ==============================================================================
# DATABASE SCHEMA SUMMARY
# ==============================================================================

database:
  engine: "PostgreSQL + pgvector extension"
  tables:
    projects:
      columns: [project_id UUID PK, project_name VARCHAR(255), vdb_namespace VARCHAR(255) UNIQUE, created_at TIMESTAMP]
      notes: "Default Project (vdb_namespace='default') created at startup, cannot be deleted"
    rag_documents:
      columns: [id TEXT PK, project_id UUID FK, embedding vector(1024), text TEXT, metadata JSONB, created_at TIMESTAMP]
      index: "HNSW on embedding (cosine)"
    faq_entries:
      columns: [id SERIAL PK, project_id UUID FK, question TEXT, answer TEXT, category VARCHAR(100), source_file VARCHAR(255)]
      index: "GIN on to_tsvector(question) for full-text search"
      special_value: "source_file='user_chat' for AI chat-sourced FAQs"
  default_project:
    uuid: "77c83dc5-9472-4e40-b18c-03df24da3ecd"
    vdb_namespace: default
    note: "Protected — HTTP 400 on delete attempt"
