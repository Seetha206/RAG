  # ---------------------------------------------------------------------------
  # P1 — FAQ PIPELINE REDESIGN (2026-03-04)
  # ---------------------------------------------------------------------------

  - id: ISSUE_022
    severity: P1
    category: RAG Pipeline
    title: "FAQ fast-path in /query produces wrong answers — remove entirely"
    status: resolved
    date_fixed: "2026-03-04"
    files_affected:
      - app.py       # lines 414–446: entire Step 1 FAQ fast-path block
      - src/faq_db.py  # search_faq() now unused from query path
    description: |
      The /query endpoint first runs a PostgreSQL ts_rank full-text search against
      the faq_entries table. If the score > 0.15 AND query >= 4 words, it returns
      the stored FAQ answer immediately — skipping RAG entirely.

      This is fundamentally wrong for a conversational assistant:
      - The FAQ table is a static snapshot (generated at upload time)
      - User questions evolve and often don't match the phrasing in stored FAQs
      - Short queries like "parking", "price" and partial phrases bypassed RAG
        even after the ISSUE_019 threshold fix — the 4-word and 0.15 filters helped
        but didn't fix the core problem
      - Users asking follow-ups or nuanced questions got stale FAQ answers instead
        of fresh LLM-generated answers from the actual document

      The FAQ table should be a DISPLAY layer (for the mind map), not an answer source.
    root_cause: |
      Wrong architectural assumption: FAQs were treated as a lookup cache for the
      query pipeline. They should only be used for the mind map display.
    fix:
      approach: "Remove Step 1 (FAQ fast-path) block from /query entirely. All queries → RAG."
      steps:
        - "Delete the query_words + search_faq block from app.py /query"
        - "Remove search_faq import from app.py (still keep it in faq_db.py for potential future use)"
        - "source_type is now always 'rag'"
    impact_after_fix: |
      All AI chat queries now always embed → vector search → LLM.
      Slightly slower but always accurate and context-aware.

  - id: ISSUE_023
    severity: P1
    category: RAG Pipeline
    title: "Chat Q&A not saved to FAQ table — mind map never learns from conversations"
    status: resolved
    date_fixed: "2026-03-04"
    files_affected:
      - app.py       # /query endpoint — add save_chat_faq() after RAG answer
      - src/faq_db.py  # add save_chat_faq() helper
    description: |
      FAQs are currently only generated at upload time by the LLM reading the document.
      When a user asks a question in the AI chat and gets a good RAG answer, that
      Q&A pair is thrown away — it never appears in the mind map.

      This means:
      - The mind map only reflects what the LLM extracted at upload time
      - Frequently-asked questions from real users never show up as FAQ nodes
      - The system doesn't improve from usage

      Desired behaviour: every successful RAG answer (with actual document results)
      should be auto-saved to faq_entries with source_file='user_chat' so it appears
      in the mind map on the next refresh.
    fix:
      approach: |
        After /query generates a RAG answer (and results were non-empty), call:
          store_faqs([{question, answer, category='General'}], source_file='user_chat', conn, project_id)
        This is non-fatal — if the insert fails, the answer is still returned.
      dedup: |
        The existing store_faqs() dedup logic (SELECT existing questions by source_file+project_id)
        prevents the same question from being added twice — safe to call on every query.
      category: |
        Saved with category='General' by default. Future enhancement: LLM-based
        category detection from the answer content.
      source_file: "'user_chat' — clearly distinct from document-generated FAQs"
      deletion: |
        user_chat FAQs persist even when documents are deleted (ISSUE_024 only
        deletes FAQs where source_file = actual_filename). This is intentional —
        chat FAQs represent real user questions and should survive document refreshes.

  - id: ISSUE_024
    severity: P1
    category: Data Management
    title: "No per-document delete — cannot remove a single file's chunks + FAQs"
    status: resolved
    date_fixed: "2026-03-04"
    files_affected:
      - src/vector_databases.py        # add delete_document() to PgVectorDatabase
      - src/faq_db.py                  # delete_faqs_by_file() already exists — reused
      - app.py                         # add DELETE /projects/{project_id}/documents/{document_id}
      - RAG/src/services/api/urls.ts   # add PROJECT_DOCUMENT_DELETE URL
      - RAG/src/services/api/projectService.ts  # add deleteProjectDocument()
      - RAG/src/components/mindmap/MindMapView.tsx  # delete button in Files panel
    description: |
      Currently the only way to remove data is:
        DELETE /reset — wipes ALL vectors (and FAQs) globally
        DELETE /projects/{id} — deletes an entire project + all its data

      There is no way to delete a single document from a project.
      If a user uploads the wrong file, or wants to replace a stale brochure,
      they have no option except resetting the whole project.

      Also: when a document IS removed, its upload-generated FAQs should be
      removed too (FAQs where source_file = that document's filename).
    fix:
      backend:
        - "PgVectorDatabase.delete_document(document_id, project_id): deletes all rows WHERE metadata->>'document_id' = %s AND project_id = %s::uuid; returns filename"
        - "App endpoint: DELETE /projects/{project_id}/documents/{document_id}"
        - "Endpoint flow: lookup filename → delete_document() → delete_faqs_by_file(filename)"
      frontend:
        - "Documents panel (Files tab) in MindMapView: add trash icon per file row"
        - "On click: confirm → DELETE request → reload documents + reload FAQs"
    cascade: |
      Only document-upload FAQs (source_file = filename) are deleted.
      user_chat FAQs (source_file = 'user_chat') are NOT deleted — they come from
      real user questions, not the document, so they remain valid.

  - id: ISSUE_025
    severity: P2
    category: Data Quality
    title: "Duplicate FAQ entries when same question asked multiple times in AI chat"
    status: open
    files_affected:
      - app.py                  # lines 502–511: auto-save block (ISSUE_023)
      - src/faq_db.py           # store_faqs() — no duplicate check before INSERT
    description: |
      Every call to POST /query that produces an answer triggers store_faqs() to
      save the Q&A pair to the faq_entries table (source_file='user_chat').
      There is no duplicate check. If a user asks the same question twice, the
      table ends up with two identical rows:

        id=5  question="What is the price?"  answer="..."  source_file="user_chat"
        id=9  question="What is the price?"  answer="..."  source_file="user_chat"

      Both rows appear as separate nodes on the FAQ mind map, cluttering it with
      repeated questions.

    options:
      option_a_app_guard:
        approach: "Check in app.py before store_faqs() call"
        description: |
          Before calling store_faqs(), run a SELECT to check if a FAQ entry with
          the same question already exists for this project. If yes, skip the save.
        pros:
          - Simple, targeted, no schema change needed
        cons:
          - Extra DB round-trip on every query
          - Only prevents duplicates from user_chat auto-saves; upload FAQs still
            have no dedup guard

      option_b_faq_db_guard:
        approach: "Duplicate check inside store_faqs() in src/faq_db.py"
        description: |
          For each FAQ entry in the list, do SELECT EXISTS(... WHERE question = %s
          AND project_id = %s) before the INSERT. Skip if already exists.
        pros:
          - Fixes deduplication for ALL callers (upload FAQs + user_chat)
          - Single responsibility — data layer enforces uniqueness
        cons:
          - N extra SELECTs per store_faqs() call (one per FAQ entry)

      option_c_db_constraint:
        approach: "UNIQUE constraint on (question, project_id) + INSERT ON CONFLICT DO NOTHING"
        description: |
          ALTER TABLE faq_entries ADD CONSTRAINT faq_unique_question_project
            UNIQUE (question, project_id);
          Change INSERT in store_faqs() to:
            INSERT INTO faq_entries (...) VALUES (...) ON CONFLICT DO NOTHING;
        pros:
          - Zero application logic needed
          - Enforced at DB level — impossible to insert duplicates regardless of caller
          - No extra SELECT round-trips
        cons:
          - Requires a one-time schema migration (ALTER TABLE)
          - Exact string match only — "What is the price?" and "what is the price?"
            would be treated as different questions unless lower() normalization added

    recommendation: |
      Option C (DB-level UNIQUE constraint) is the most robust.
      Option B is the pragmatic middle ground if schema migration is not desired.
      Combine with lower() normalization on question text for best dedup coverage.

