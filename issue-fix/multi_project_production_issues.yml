  - id: ISSUE_011
    severity: P2
    category: Scalability
    title: "FAQ generation blocks the upload HTTP response (up to 180s)"
    files_affected:
      - app.py                        # line 284: faqs = generate_faqs(full_text, llm_client, ...)
    description: |
      generate_faqs() is called synchronously during POST /upload before returning the response.
      With Ollama, the timeout is 180s. Even with Gemini Flash, a 50K-char document can take
      5-15 seconds. The client must wait for FAQ generation to complete before getting a response.
      CLAUDE.md notes this: "Can be moved to FastAPI BackgroundTasks if needed."
    impact: |
      Upload endpoint appears slow or times out for large documents.
      Clients must wait for FAQ generation before confirming upload success.
    fix:
      approach: "Move FAQ generation to FastAPI BackgroundTasks"
      steps:
        - "Add BackgroundTasks parameter to upload_document signature"
        - "Replace synchronous generate_faqs() call with: background_tasks.add_task(run_faq_generation, full_text, llm_client, file.filename, db_conn, resolved_project_id)"
        - "Define run_faq_generation() as a standalone function"
        - "Return UploadResponse immediately with faqs_generated=0 (pending)"
        - "Add a GET /faqs/status?document_id= endpoint if clients need to know when FAQs are ready"
      code_sketch: |
        from fastapi import BackgroundTasks

        @app.post("/upload")
        async def upload_document(
            ...,
            background_tasks: BackgroundTasks,
        ):
            # ... embed and store vectors ...

            background_tasks.add_task(
                run_faq_generation,
                full_text, llm_client, file.filename, db_conn, resolved_project_id
            )
            return UploadResponse(..., faqs_generated=0)

  - id: ISSUE_012
    severity: P2
    category: Structural
    title: "Duplicate document uploads create duplicate vector chunks"
    files_affected:
      - app.py                        # line 273: vector_db.add() — no dedup check
    description: |
      Uploading the same file twice to the same project inserts duplicate chunks
      (timestamp-based IDs differ so ON CONFLICT rarely fires). Duplicate chunks:
        - Return the same passage twice in RAG results
        - Inflate similarity scores for that document
        - FAQs are deduplicated by exact question+source_file match, but vectors are not
    impact: |
      Skewed retrieval quality. Same chunk appears twice in LLM context. Wastes storage.
    fix:
      approach: "Hash document content and skip re-embedding if already present"
      steps:
        - "import hashlib; doc_hash = hashlib.sha256(file_bytes).hexdigest()"
        - "Add doc_hash column to rag_documents metadata JSONB"
        - "Before embedding: SELECT COUNT(*) FROM rag_documents WHERE metadata->>'doc_hash' = %s AND project_id = %s"
        - "If count > 0: skip embedding, optionally re-generate FAQs, return early with message 'Document already uploaded'"
        - "Store doc_hash in metadata dict for each chunk"

  - id: ISSUE_013
    severity: P2
    category: Scalability
    title: "GET /faqs has no pagination — returns all FAQs in one response"
    files_affected:
      - app.py                        # line 422: get_faqs()
      - src/faq_db.py                 # line 136: get_all_faqs() — SELECT all rows
    description: |
      With many uploads to one project, faq_entries grows unbounded.
      SELECT * FROM faq_entries WHERE project_id = ? with no LIMIT can return
      thousands of rows in a single HTTP response. The mind map SVG also has no
      virtual scrolling — rendering becomes unusable past ~200 FAQs.
    impact: |
      Large responses degrade frontend performance. DB query time increases linearly.
    fix:
      approach: "Add limit/offset pagination and a per-category cap"
      steps:
        - "Add query params to GET /faqs: limit: int = 200, offset: int = 0"
        - "In get_all_faqs(): add LIMIT %s OFFSET %s to query"
        - "Return pagination metadata in FAQsResponse: {total, limit, offset, has_more}"
        - "In mind map UI: load first 200 FAQs, add 'Load more' per category if needed"

  - id: ISSUE_014
    severity: P2
    category: Structural
    title: "ProjectCreate.project_name has no validation"
    files_affected:
      - src/models.py                 # line 79: project_name: str — bare string
    description: |
      project_name accepts empty strings, whitespace-only names, or strings longer
      than 255 characters (which hit PostgreSQL VARCHAR(255) and return a raw psycopg2
      DataError as a 500). Multiple projects can share identical names.
    impact: |
      Confusing duplicate project names in the UI. Raw DB errors on too-long names.
    fix:
      approach: "Add Pydantic field constraints"
      steps:
        - "from pydantic import Field"
        - "project_name: str = Field(min_length=1, max_length=255, strip_whitespace=True)"
        - "Optionally: add a uniqueness check in create_project() before INSERT and raise HTTP 409 if taken"

  - id: ISSUE_015
    severity: P2
    category: Structural
    title: "top_k in QueryRequest has no upper bound"
    files_affected:
      - src/models.py                 # line 12: top_k: Optional[int] = RAG_CONFIG["top_k"]
    description: |
      top_k accepts any integer. A caller sending top_k=100000 causes:
        LIMIT 100000 in the pgvector search — returns up to entire table
        All results passed to the LLM as context — exceeds token limits
        Extremely slow queries under any real data volume
    impact: |
      Resource exhaustion on both the DB and LLM API. Possible OOM on context assembly.
    fix:
      approach: "Add Pydantic Field constraints"
      steps:
        - "top_k: Optional[int] = Field(default=RAG_CONFIG['top_k'], ge=1, le=50)"

  - id: ISSUE_016
    severity: P2
    category: Security
    title: "CORS allows all origins — not enforced at deployment"
    files_affected:
      - config.py                     # line 187: "cors_origins": ["*"]
    description: |
      CORS is configured as wildcard. The comment says "adjust for production"
      but there is no mechanism that enforces this or warns if deployed as-is.
      In production, CORS should be restricted to the actual frontend domain
      (e.g. sellbot-ai.vercel.app).
    impact: |
      Any website can make credentialed cross-origin requests to the API.
    fix:
      approach: "Read CORS origins from environment variable with a strict default"
      steps:
        - "Add to .env: CORS_ORIGINS=https://sellbot-ai.vercel.app"
        - "In config.py: 'cors_origins': os.getenv('CORS_ORIGINS', '').split(',') or raise ValueError if empty in prod"
        - "Or warn loudly on startup if CORS_ORIGINS contains '*' and APP_ENV=production"


  # ---------------------------------------------------------------------------
  # NEW ISSUES — Identified 2026-03-04
