  # P1 — HIGH
  # ---------------------------------------------------------------------------

  - id: ISSUE_005
    severity: P1
    category: Structural
    title: "Schema drift between SQL migration file and Python auto-setup"
    files_affected:
      - YAML/multi_project_schema.sql # reference schema
      - src/faq_db.py                 # line 21: setup_faq_table() — deviates from SQL
      - src/vector_databases.py       # line 530: _setup_database() — missing index
    description: |
      Three divergences between the official SQL schema and what Python creates at startup:

      | Field                          | multi_project_schema.sql        | Python auto-setup          |
      |--------------------------------|---------------------------------|----------------------------|
      | faq_entries.id                 | UUID DEFAULT gen_random_uuid()  | SERIAL (integer)           |
      | faq_entries.project_id         | NOT NULL                        | nullable                   |
      | faq_entries.source column      | present (VARCHAR 50)            | missing                    |
      | idx_rag_documents_project_id   | created                         | never created              |

      The missing idx_rag_documents_project_id index means project-scoped vector searches
      do a full table scan on the project_id filter before applying the HNSW index.
    impact: |
      New installs using Python auto-setup have different schema than SQL-migrated installs.
      project_id nullable allows orphan FAQ entries.
      Missing index degrades project-scoped search performance at scale.
    fix:
      approach: "Align setup_faq_table() and _setup_database() with the SQL schema"
      steps:
        - "In setup_faq_table(): change id column to UUID PRIMARY KEY DEFAULT gen_random_uuid()"
        - "In setup_faq_table(): add NOT NULL constraint on project_id"
        - "In setup_faq_table(): add source VARCHAR(50) DEFAULT 'pdf_generated' column"
        - "In _setup_database(): add CREATE INDEX IF NOT EXISTS idx_rag_documents_project_id ON rag_documents(project_id)"
        - "Update src/models.py FAQEntry.id type from int to str (UUID string)"
        - "Run migration on existing DB to backfill: UPDATE faq_entries SET project_id = default_project_id WHERE project_id IS NULL"

  - id: ISSUE_006
    severity: P1
    category: Structural
    title: "project_id is never validated as a valid UUID"
    files_affected:
      - app.py                        # line 189: project_id Form field in /upload
      - app.py                        # line 339: project_id in /query
      - app.py                        # line 157: project_id path param in GET /projects/{id}
      - src/models.py                 # line 13: QueryRequest.project_id — no UUID validation
    description: |
      project_id is accepted as a raw str everywhere. Any non-UUID string (e.g. "abc", "123")
      is passed to SQL with a ::uuid cast. PostgreSQL raises an exception:
        'invalid input syntax for type uuid: "abc"'
      This surfaces as a raw 500 error with a psycopg2 stack trace in the response body.
    impact: |
      Bad UX: client gets a 500 instead of a clean 422 validation error.
      Exposes internal psycopg2 error messages to callers.
    fix:
      approach: "Add UUID validation helper and apply at every project_id entry point"
      steps:
        - "Add utility: def validate_uuid(v: str) -> bool: try: uuid.UUID(v); return True except ValueError: return False"
        - "In /upload: if project_id and not validate_uuid(project_id): raise HTTPException(422, 'project_id must be a valid UUID')"
        - "In /query: add UUID validator to QueryRequest using Pydantic @field_validator"
        - "In GET/DELETE /projects/{project_id}: validate before DB call, return 404 on bad UUID"
        - "In src/models.py: add Pydantic UUID type: project_id: Optional[uuid.UUID] = None"

  - id: ISSUE_007
    severity: P1
    category: Structural
    title: "Vector count check and total_chunks use global count, not project-scoped"
    files_affected:
      - app.py                        # line 371: stats.get('total_vectors', 0) == 0 check
      - app.py                        # line 308: total_chunks=stats.get('total_vectors', 0)
      - src/vector_databases.py       # line 680: get_stats() — SELECT COUNT(*) globally
    description: |
      Two problems with the global count:
      1. Empty-project guard: if Project A has 1000 vectors and Project B has 0,
         a query to Project B passes the count check (global count = 1000) and
         falls through to empty results with a misleading 'try rephrasing' message.
      2. UploadResponse.total_chunks shows the total vectors across ALL projects,
         not the project the file was uploaded to.
    impact: |
      Users querying an empty project get a confusing error instead of
      "this project has no documents yet."
      Upload response shows misleading global chunk count.
    fix:
      approach: "Add project_id parameter to get_stats() and use scoped count"
      steps:
        - "In PgVectorDatabase.get_stats(project_id=None): add WHERE project_id = %s filter when project_id is provided"
        - "In /upload: call vector_db.get_stats(project_id=resolved_project_id) for total_chunks"
        - "In /query: call vector_db.get_stats(project_id=resolved_project_id) for the empty-check"
        - "Return HTTP 400 with clear message: 'Project has no documents. Upload documents first.'"

  - id: ISSUE_008
    severity: P1
    category: Scalability + Structural
    title: "document_counter is in-memory, not persistent, and unsafe across workers"
    files_affected:
      - app.py                        # line 80:  document_counter = {"count": 0}
      - app.py                        # line 261: doc_id = f"doc_{document_counter['count']}_{int(time.time())}"
    description: |
      The in-memory counter:
        1. Resets to 0 on every server restart → doc_0_<timestamp> reused
        2. With gunicorn -w 4, each worker starts at 0 → identical IDs possible across workers
        3. The ON CONFLICT DO UPDATE in PgVectorDatabase.add() will silently OVERWRITE
           a different document's chunks if IDs collide (same counter + same millisecond)
    impact: |
      Silent data loss in multi-worker production deployments.
      Restarts cause document ID reuse which overwrites old data on re-upload.
    fix:
      approach: "Generate document IDs with uuid4() — no counter needed"
      steps:
        - "Replace: doc_id = f'doc_{document_counter[count]}_{int(time.time())}'"
        - "With:    import uuid; doc_id = f'doc_{uuid.uuid4().hex[:12]}'"
        - "Remove document_counter dict entirely"
        - "In /status: replace total_documents=document_counter['count'] with a DB query:
           SELECT COUNT(DISTINCT metadata->>'document_id') FROM rag_documents"

  - id: ISSUE_009
    severity: P1
    category: Scalability
    title: "No reconnect logic — single stale connection crashes all DB operations"
    files_affected:
      - src/vector_databases.py       # line 522: self.conn created once at init
      - app.py                        # line 87:  db_conn = vector_db.conn (same connection)
    description: |
      If PostgreSQL drops the connection (idle timeout, server restart, Railway network blip),
      self.conn goes stale. Every subsequent DB call raises:
        'InterfaceError: connection already closed'
      FAQ operations fail silently (caught by try/except in app.py), but vector
      operations raise unhandled exceptions that return 500 to all clients.
      This is especially common on Railway which closes idle connections after ~5 minutes.
    impact: |
      All DB operations fail after any network interruption until server is restarted.
    fix:
      approach: "Use ThreadedConnectionPool (from ISSUE_001) — pools handle reconnect.
                 If staying with single connection, add a ping-and-reconnect wrapper."
      steps:
        - "Preferred: implement ISSUE_001 (connection pool) which handles this automatically"
        - "Fallback: add reconnect() method to PgVectorDatabase that checks conn.closed and reconnects"
        - "Wrap all DB cursor blocks with a reconnect decorator or try/except/reconnect pattern"
      code_sketch: |
        def _ensure_connection(self):
            if self.conn.closed:
                self.conn = psycopg2.connect(self.connection_string)
                self.conn.autocommit = True

        # Call at start of every method:
        self._ensure_connection()

  - id: ISSUE_010
    severity: P1
    category: Structural
    title: "store_faqs uses N+1 SELECT + INSERT queries per FAQ"
    files_affected:
      - src/faq_db.py                 # line 70: per-FAQ SELECT then INSERT loop
    description: |
      For each of up to 25 FAQs being stored, the function issues:
        1. SELECT to check for duplicate question
        2. INSERT if not duplicate
      That is up to 50 individual SQL round trips per document upload.
      With network latency (Railway → PostgreSQL), each round trip ~2-5ms = 100-250ms overhead.
    impact: |
      Unnecessary DB round trips slow every upload. Degrades linearly as max_faqs grows.
    fix:
      approach: "Replace SELECT + INSERT loop with single bulk INSERT ON CONFLICT DO NOTHING"
      steps:
        - "Collect all FAQ tuples into a list"
        - "Use execute_values() with INSERT ... ON CONFLICT (project_id, question, source_file) DO NOTHING"
        - "Add UNIQUE constraint: ALTER TABLE faq_entries ADD CONSTRAINT uq_faq_per_file UNIQUE (project_id, question, source_file)"
        - "Return inserted count using cursor.rowcount"
      code_sketch: |
        from psycopg2.extras import execute_values

        rows = [(project_id, faq['question'], faq['answer'], faq['category'], source_file)
                for faq in faqs if faq.get('question') and faq.get('answer')]

        execute_values(cur,
            """INSERT INTO faq_entries (project_id, question, answer, category, source_file)
               VALUES %s
               ON CONFLICT (project_id, question, source_file) DO NOTHING""",
            rows)
        return cur.rowcount

  - id: ISSUE_017
    severity: P1
    category: Security
    title: "project_id=None fallback leaks cross-project data when DB setup fails"
    files_affected:
      - app.py                        # line 339: resolved_project_id = request.project_id or default_project_id
      - app.py                        # line 382: vector_db.search(..., project_id=resolved_project_id)
    description: |
      At startup, if DB setup fails (e.g. PostgreSQL unreachable), db_conn = None
      and default_project_id = None. Then on any query:
        resolved_project_id = request.project_id or None  →  None
        vector_db.search(query_embedding, top_k, project_id=None)
      In PgVectorDatabase.search(), project_id=None triggers the unscoped branch:
        SELECT ... FROM rag_documents  (no WHERE clause)
      This returns vectors from ALL projects to any caller, bypassing isolation.
    impact: |
      Data isolation breach: all projects' data exposed when DB partially fails at startup.
    fix:
      approach: "Fail hard if default_project_id is None, never fall through to unscoped search"
      steps:
        - "After startup: if VECTOR_DB_CONFIG['provider'] == 'pgvector' and default_project_id is None: raise RuntimeError('DB setup failed — cannot start server safely')"
        - "In /query: if resolved_project_id is None: raise HTTPException(503, 'Project system unavailable')"
        - "Never pass project_id=None to vector_db.search() in a multi-project context"

