# =============================================================================
# Multi-Project Architecture — Production Issues & Fix Plan
# Generated: 2026-03-03
# Scope: Scalability, Security, Structural correctness
# =============================================================================
# Severity levels:
#   P0 — Critical: will crash or corrupt data under real usage
#   P1 — High: incorrect behaviour, data leaks, or hard failures
#   P2 — Medium: quality, performance, or usability degradation
# =============================================================================

issues:

  # ---------------------------------------------------------------------------
  # P0 — CRITICAL
  # ---------------------------------------------------------------------------

  - id: ISSUE_001
    severity: P0
    category: Scalability
    title: "Single shared psycopg2 connection — not thread-safe"
    files_affected:
      - src/vector_databases.py       # line 522: self.conn = psycopg2.connect(...)
      - app.py                        # line 87:  db_conn = vector_db.conn
    description: |
      One psycopg2 connection is created at startup and shared across every
      concurrent HTTP request. psycopg2 connections are NOT safe for
      concurrent use. Under any real load (gunicorn -w 4, parallel uploads
      or queries) this produces cursor conflicts, "cursor already in use"
      errors, and silent data corruption.
    impact: |
      Data corruption or crashes under concurrent load.
      Gunicorn multi-worker mode will each start with their own connection
      but within a single worker concurrent async requests share one connection.
    fix:
      approach: "Replace single connection with ThreadedConnectionPool"
      steps:
        - "In PgVectorDatabase.__init__, replace psycopg2.connect() with
           psycopg2.pool.ThreadedConnectionPool(minconn=2, maxconn=10, dsn=connection_string)"
        - "Wrap every DB operation with: conn = self.pool.getconn() / finally: self.pool.putconn(conn)"
        - "Pass pool reference to faq_db and project_manager functions instead of a raw conn"
        - "Long-term alternative: switch to asyncpg + asyncpg.create_pool() for true async"
      code_sketch: |
        from psycopg2 import pool
        self.pool = pool.ThreadedConnectionPool(2, 10, connection_string)

        # In every method:
        conn = self.pool.getconn()
        try:
            with conn.cursor() as cur:
                cur.execute(...)
        finally:
            self.pool.putconn(conn)

  - id: ISSUE_002
    severity: P0
    category: Security
    title: "No authentication on any API endpoint"
    files_affected:
      - app.py                        # all route handlers
      - config.py                     # API_CONFIG — no auth key
    description: |
      Every endpoint is completely open. No API key header, no bearer token,
      no OAuth. Anyone with the Railway URL can:
        - List and delete any project (DELETE /projects/{id})
        - Wipe the entire vector DB (DELETE /reset)
        - Upload documents and exhaust the Gemini API quota
        - Read all FAQs from every project (GET /faqs)
    impact: |
      Full data exposure and destruction from any public caller.
      Gemini API quota can be exhausted by uploading large files repeatedly.
    fix:
      approach: "Add static API key middleware in app.py"
      steps:
        - "Add API_KEY to .env: API_KEY=<strong-random-string>"
        - "Read it in config.py: 'api_key': os.getenv('API_KEY')"
        - "Add a FastAPI middleware that checks X-API-Key header on every non-root request"
        - "Return HTTP 401 if header is missing or wrong"
        - "Exempt GET / (root info) from auth check"
        - "Long-term: replace with JWT + per-project API keys for true multi-tenancy"
      code_sketch: |
        from fastapi import Request
        from starlette.middleware.base import BaseHTTPMiddleware

        class APIKeyMiddleware(BaseHTTPMiddleware):
            async def dispatch(self, request: Request, call_next):
                if request.url.path == "/":
                    return await call_next(request)
                key = request.headers.get("X-API-Key")
                if key != API_CONFIG["api_key"]:
                    return JSONResponse({"detail": "Unauthorized"}, status_code=401)
                return await call_next(request)

        app.add_middleware(APIKeyMiddleware)

  - id: ISSUE_003
    severity: P0
    category: Security + Structural
    title: "DELETE /reset is unprotected, global, and leaves FAQs behind"
    files_affected:
      - app.py                        # line 476: reset_database()
      - src/vector_databases.py       # line 674: PgVectorDatabase.reset() — only deletes rag_documents
    description: |
      Two problems in one endpoint:
      1. No authentication guard (covered by ISSUE_002, but specifically dangerous here)
      2. reset() only executes DELETE FROM rag_documents — faq_entries are NOT cleared.
         After a reset, GET /faqs still returns all old FAQs → inconsistent system state.
    impact: |
      POST /reset → rag_documents empty → GET /faqs still returns hundreds of stale FAQs.
      The mind map shows FAQs that have no backing documents to answer follow-up questions.
    fix:
      approach: "Fix reset() to also clear FAQs, and add project-scoped reset option"
      steps:
        - "In PgVectorDatabase.reset(), add DELETE FROM faq_entries after rag_documents"
        - "Add optional project_id parameter: reset only one project's data if supplied"
        - "Update DELETE /reset endpoint to accept optional ?project_id= query param"
        - "After auth middleware (ISSUE_002 fix), require admin-level key for global reset"
      code_sketch: |
        # In PgVectorDatabase.reset():
        def reset(self, project_id: str = None) -> None:
            with self.conn.cursor() as cur:
                if project_id:
                    cur.execute("DELETE FROM rag_documents WHERE project_id = %s::uuid", (project_id,))
                    cur.execute("DELETE FROM faq_entries WHERE project_id = %s::uuid", (project_id,))
                else:
                    cur.execute("DELETE FROM rag_documents")
                    cur.execute("DELETE FROM faq_entries")

  - id: ISSUE_004
    severity: P0
    category: Scalability
    title: "Blocking synchronous calls inside async FastAPI endpoints"
    files_affected:
      - app.py                        # line 255: embedder.embed(chunks)
      - app.py                        # line 379: embedder.embed(normalized_question)
      - app.py                        # line 382: vector_db.search(...)
      - src/vector_databases.py       # all psycopg2 calls — blocking
      - src/faq_db.py                 # all psycopg2 calls — blocking
    description: |
      FastAPI runs on asyncio. All endpoints are `async def`, but:
        - embedder.embed() uses fastembed/numpy — CPU-bound blocking
        - vector_db.search() / vector_db.add() use synchronous psycopg2 — I/O blocking
        - All faq_db functions are synchronous psycopg2 — I/O blocking
      Blocking calls in async def stall the entire event loop. While one request
      is embedding a 100-chunk document, zero other requests are served.
    impact: |
      Under any concurrent load the server becomes unresponsive.
      Upload of a large document can block all other requests for several seconds.
    fix:
      approach: "Wrap sync calls with asyncio.run_in_executor"
      steps:
        - "Import asyncio in app.py"
        - "For embedding: embeddings = await loop.run_in_executor(None, embedder.embed, chunks)"
        - "For DB operations: wrap each blocking call in run_in_executor"
        - "Or: switch vector DB operations to asyncpg (longer-term, pairs with ISSUE_001 fix)"
      code_sketch: |
        import asyncio

        loop = asyncio.get_event_loop()

        # In upload_document:
        embeddings = await loop.run_in_executor(None, embedder.embed, chunks)

        # In query_knowledge_base:
        query_embedding = await loop.run_in_executor(None, embedder.embed, normalized_question)
        results = await loop.run_in_executor(None, vector_db.search, query_embedding, request.top_k, resolved_project_id)

