  - id: ISSUE_018
    severity: P1
    category: Structural + Frontend
    title: "No 'Connected Documents' view — users cannot see which files are uploaded to a project"
    files_affected:
      - app.py                              # no GET /projects/{id}/documents endpoint
      - RAG/src/pages/DashboardPage.tsx     # no document list panel
      - RAG/src/components/mindmap/MindMapView.tsx  # no uploaded files list in UI
    description: |
      After uploading documents to a project there is no way in the UI — or via
      the API — to see which files are currently stored in that project.

      The data already exists:
        - File names are stored in metadata->>'filename' in every rag_documents row
        - File names are stored in source_file column of every faq_entries row

      But there is:
        - No GET /projects/{project_id}/documents endpoint
        - No documents panel or file list in DashboardPage or MindMapView
        - No way to delete a single document (only DELETE /reset which wipes all vectors)
    impact: |
      Users must guess what documents are indexed.
      Re-uploading the same file creates duplicate vectors (see ISSUE_012).
      Cannot remove a single wrong/outdated document without wiping everything.
    fix:
      approach: "Add a documents endpoint + a collapsible file list panel in MindMapView"
      backend_steps:
        - "Add GET /projects/{project_id}/documents endpoint in app.py"
        - "SQL: SELECT DISTINCT metadata->>'filename' AS filename, COUNT(*) AS chunk_count,
           MIN(created_at) AS uploaded_at FROM rag_documents WHERE project_id = %s::uuid
           GROUP BY filename ORDER BY uploaded_at DESC"
        - "Return: [{filename, chunk_count, uploaded_at}]"
        - "Add DELETE /projects/{project_id}/documents/{filename} endpoint to remove one file's vectors + FAQs"
        - "SQL: DELETE FROM rag_documents WHERE project_id = %s::uuid AND metadata->>'filename' = %s"
        - "        DELETE FROM faq_entries WHERE project_id = %s::uuid AND source_file = %s"
      frontend_steps:
        - "Add documentService.ts with getDocuments(projectId) and deleteDocument(projectId, filename)"
        - "Add RAG_URLS.PROJECT_DOCUMENTS: (id) => '/projects/${id}/documents' to urls.ts"
        - "In MindMapView.tsx: add a collapsible 'Uploaded Files' side panel listing files with delete button"
        - "Show chunk_count and uploaded_at for each file"
        - "On delete: confirm dialog → call deleteDocument → refresh FAQ tree"

  - id: ISSUE_019
    severity: P2
    category: RAG Pipeline
    title: "FAQ full-text search threshold too aggressive — single word queries always bypass RAG"
    files_affected:
      - src/faq_db.py                # line 246: if rank < 0.01: return None
      - app.py                       # /query endpoint — FAQ-first pipeline
    description: |
      The query pipeline is FAQ-first: any query that matches a FAQ question with
      ts_rank > 0.01 immediately returns the FAQ answer and skips the RAG pipeline.

      The threshold 0.01 is extremely permissive. A single word overlap is enough
      to satisfy it. This means:

        - User types "parking" → ts_rank > 0.01 against "Is parking available? Yes, 2 slots per flat."
          → returns that FAQ answer even if the user meant "visitor parking cost" or
            "parking dimensions for double-decker"
        - User types "price" → matches any of 5 pricing FAQs → returns the first one
          even if the user's intent was to compare prices across documents
        - User types "location" → returns the generic location FAQ even if user wanted
          the exact GPS coordinates from an uploaded PDF

      The FAQ-first design was intended as a fast shortcut for common verbatim questions.
      At 0.01 it becomes a hijack — users cannot reach the RAG pipeline with broad queries.
    impact: |
      - Irrelevant FAQ answers returned for queries where the user's intent differs from FAQ wording
      - RAG pipeline (which uses full document context) is effectively bypassed for any common word
      - Users lose trust when vague one-word queries return confidently wrong FAQ answers
    fix:
      approach: "Raise threshold AND add minimum query length guard"
      option_1_quickest:
        label: "Raise threshold (single-line fix)"
        file: src/faq_db.py
        line: 246
        change: "if rank < 0.01 → if rank < 0.15"
        note: "0.15 requires a meaningful phrase match, not just word presence"
      option_2_length_guard:
        label: "Minimum word count before FAQ search"
        file: app.py
        change: |
          # In /query endpoint, before calling search_faq():
          words = normalized_question.strip().split()
          if len(words) >= 4:
              faq_result = search_faq(normalized_question, db_conn, project_id=resolved_project_id)
          else:
              faq_result = None  # short queries go straight to RAG
        note: "Queries under 4 words skip FAQ and go to RAG — avoids false confidence on vague terms"
      option_3_best:
        label: "Run both, return both to LLM"
        change: |
          Run FAQ search and RAG search in parallel.
          Pass both results to the LLM with instruction:
          'If the FAQ directly answers the question, use it.
           Otherwise use the document chunks.'
        note: "Best answer quality but doubles LLM context size and cost"
      recommended: "option_1_quickest + option_2_length_guard together — fast, no LLM change needed"

  - id: ISSUE_020
    severity: P2
    category: Structural + Frontend
    title: "AI chat shows no source document attribution — user cannot verify which file answered"
    files_affected:
      - RAG/src/components/mindmap/MindMapView.tsx   # chat messages rendered without source panel
      - src/models.py                                 # QueryResponse.sources exists but not shown
    description: |
      The backend QueryResponse already returns a sources list:
        { answer, sources: [{filename, relevance}], processing_time_ms, source_type }

      However the MindMapView AI chat panel only renders the answer text.
      The sources array is fetched but never displayed to the user.

      This means:
        - User cannot see which uploaded document provided the answer
        - User cannot cross-check the answer against the original file
        - When source_type="faq", user doesn't know which document originally generated that FAQ
        - When source_type="rag", user doesn't know if the answer came from Brochure_A.pdf
          or PriceList_B.xlsx — important for real estate sales decisions

      Additionally, source_type="faq" vs "rag" badge exists in the response
      but is not shown in the chat UI.
    impact: |
      Users cannot audit or trust answers without knowing the source document.
      In real estate, factual accuracy matters — wrong price from wrong project document
      can cause serious miscommunication.
    fix:
      approach: "Show source chips and source_type badge below each AI answer in chat"
      frontend_steps:
        - "In MindMapView.tsx chat panel: after rendering the answer markdown, add a sources row"
        - "Render source_type badge: green 'FAQ' or blue 'Document' pill"
        - "Render source chips: for each source in sources array, show filename + relevance %"
        - "Chip style: small pill with file icon (FileText from lucide-react), filename truncated,
           relevance shown as e.g. '82% match'"
        - "On chip click: if ISSUE_018 is fixed, navigate to the file in the documents list"
      data_available:
        - "response.source_type: 'faq' | 'rag'"
        - "response.sources: [{filename: string, relevance: float}]"
        - "response.processing_time_ms: number"
      ui_sketch: |
        [ Answer text rendered with react-markdown ]

        ┌─────────────────────────────────────────────┐
        │ 📄 FAQ  •  Sunrise_Heights_Brochure.pdf 82% │
        │           Green_Valley_PriceList.xlsx  71%  │
        └─────────────────────────────────────────────┘
        [ 340ms ]

  - id: ISSUE_021
    severity: P2
    category: Feature + Structural
    title: "Dashboard has no global AI chat — users cannot query across all projects at once"
    files_affected:
      - RAG/src/pages/DashboardPage.tsx     # no chat panel
      - app.py                              # /query always resolves to a single project_id
      - src/models.py                       # QueryRequest has no global_search mode
      - src/vector_databases.py             # search() always filters by project_id when set
    description: |
      The MindMapView has an AI chat panel scoped to one project.
      The Dashboard (projects listing page) has no AI chat at all.

      Users want a GLOBAL chat on the Dashboard that searches across ALL
      documents from ALL projects simultaneously — useful for cross-project
      questions like:
        "Which project has the cheapest 3BHK?"
        "Do any of my projects have swimming pools?"
        "Compare parking facilities across all uploaded brochures"

      Current backend gap:
        POST /query with no project_id → resolves to default_project_id
        (line: resolved_project_id = request.project_id or default_project_id)
        There is NO mode that searches across all projects — it always scopes to one.

      So two things are missing:
        1. A backend "global search" mode (search all rag_documents with no project filter)
        2. A chat UI panel on the DashboardPage

    impact: |
      Users must open each project individually and re-ask the same question to
      compare answers. Cross-project questions are impossible with current routing.

    fix:
      approach: "Add global_search flag to QueryRequest + chat panel on DashboardPage"

      backend_steps:
        - step: "Add global_search field to QueryRequest in src/models.py"
          code: |
            class QueryRequest(BaseModel):
                question: str
                top_k: Optional[int] = RAG_CONFIG["top_k"]
                project_id: Optional[str] = None
                global_search: bool = False   # NEW — search all projects when True

        - step: "In /query endpoint in app.py, handle global_search=True"
          code: |
            if request.global_search:
                resolved_project_id = None   # no project filter → searches all rows
            else:
                resolved_project_id = request.project_id or default_project_id

            # Then pass resolved_project_id to search() and search_faq()
            # When resolved_project_id is None:
            #   vector_db.search() → no WHERE project_id filter (already supported)
            #   search_faq() → no WHERE project_id filter (already supported)

        - step: "Verify PgVectorDatabase.search() and search_faq() already handle project_id=None"
          note: |
            Both functions already have an if/else on project_id:
              if project_id: → scoped query
              else:          → unscoped query (all rows)
            So the backend behaviour is already correct — only the resolver in
            app.py needs to stop forcing default_project_id when global_search=True.

        - step: "Update system prompt for global search context"
          note: |
            When global_search=True, chunks come from multiple projects.
            The LLM system prompt already says: 'cite the property or project name
            in your answer' — this handles cross-project answers naturally.

      frontend_steps:
        - step: "Add a floating chat button to DashboardPage"
          detail: |
            Bottom-right fixed button: chat bubble icon (MessageSquare from lucide-react)
            Clicking opens a slide-up chat panel (same glass-card dark style as MindMapView)

        - step: "Chat panel state in DashboardPage"
          detail: |
            useState: messages[], inputText, isLoading, showChat
            On send: call ragService.postQuery({ question, global_search: true })
            No project_id passed → backend uses global_search mode

        - step: "Chat panel UI"
          detail: |
            Header: 'Global Knowledge Search' with a LayoutGrid icon
            Subtitle: 'Searching across all [N] projects'
            Message bubbles: same style as MindMapView chat
            Source chips: show filename AND project_name (ISSUE_020 extension)
            Empty state: 'Ask anything across all your uploaded documents'

        - step: "Add global_search: true to ragService.postQuery call"
          file: RAG/src/services/api/ragService.ts
          detail: |
            postQuery already accepts a QueryRequest body.
            Just pass { question, global_search: true } for dashboard calls.

      ui_sketch: |
        ┌─ DashboardPage ─────────────────────────────────────────┐
        │  Projects                              [+ New Project]   │
        │  ┌──────┐ ┌──────┐ ┌──────┐ ┌──────┐                   │
        │  │Proj A│ │Proj B│ │Proj C│ │  +   │                   │
        │  └──────┘ └──────┘ └──────┘ └──────┘                   │
        │                                                          │
        │                              ┌────────────────────────┐ │
        │                              │  Global Knowledge Chat │ │
        │                              │  Searching 3 projects  │ │
        │                              │  ─────────────────── │ │
        │                              │  User: Which project   │ │
        │                              │  has cheapest 3BHK?    │ │
        │                              │                         │ │
        │                              │  AI: Sunrise Heights... │ │
        │                              │  📄 RAG • Brochure.pdf  │ │
        │                              │  ─────────────────── │ │
        │                              │  [ Ask anything... ] →  │ │
        │                              └────────────────────────┘ │
        │                                          [💬]            │
        └──────────────────────────────────────────────────────────┘

    dependencies:
      - "ISSUE_020 source chips (optional but strongly recommended — cross-project answers
         need to show which project+file answered)"
      - "No dependency on ISSUE_018 (documents view) — can be implemented independently"

    notes:
      - "global_search=True bypasses project isolation intentionally — it is a user-requested
         cross-project feature, not a data leak. The fix for ISSUE_017 (startup failure fallback)
         must ensure the None path is only reachable via explicit global_search flag."
      - "FAQ search across all projects also works (search_faq with project_id=None returns
         the best FAQ match across all faq_entries) — this is desirable for global chat."


